services:
  vllm:
    image: vllm/vllm-openai:v0.25.1
    restart: unless-stopped
    ports:
      - "${VLLM_PORT:-8000}:8000"
    volumes:
      - "${MODEL_SNAPSHOT_PATH}:/models/llama-3.1-8b-instruct:ro"
    environment:
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      # Docker Desktop's WSL2 backend disables pinned memory for CUDA by
      # default; vLLM's GPU worker requires it (UVA buffers). Kernel here is
      # 6.6.x, well above the 4.19.121 minimum this flag assumes.
      - VLLM_WSL2_ENABLE_PIN_MEMORY=1
    command: >
      --model /models/llama-3.1-8b-instruct
      --served-model-name llama-3.1-8b-instruct
      --enable-auto-tool-choice
      --tool-call-parser llama3_json
      --max-model-len ${VLLM_MAX_MODEL_LEN:-16384}
      --gpu-memory-utilization ${VLLM_GPU_MEMORY_UTILIZATION:-0.90}
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  imagegen:
    build: ./imagegen
    restart: unless-stopped
    volumes:
      - "${IMAGEGEN_DIFFUSION_MODELS_PATH}:/models/diffusion_models:ro"
      - imagegen-hf-cache:/hf-cache
    environment:
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - IMAGEGEN_UNET_DIR=/models/diffusion_models
      - IMAGEGEN_UNET_FILENAME=${IMAGEGEN_UNET_FILENAME:-zImageTurbo_turbo.safetensors}
      - IMAGEGEN_HF_CACHE_DIR=/hf-cache
      - HOME=/hf-cache/home
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "${SEARXNG_PORT:-8080}:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:${SEARXNG_PORT:-8080}/

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-vllm}
      - VLLM_BASE_URL=http://vllm:8000/v1
      - VLLM_MODEL_NAME=llama-3.1-8b-instruct
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL_NAME=${OPENAI_MODEL_NAME:-gpt-4o-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL_NAME=${ANTHROPIC_MODEL_NAME:-claude-sonnet-5}
      - SEARXNG_URL=http://searxng:8080
      - CHROMA_PERSIST_DIR=/data/chroma
      - CHECKPOINT_DB_PATH=/data/checkpoints.db
      - REFERENCE_DATA_DIR=/data/reference
      - ARTIST_STYLES_FILE=/data/reference/artist-photographer-styles.md
      - CORS_ORIGINS=http://localhost:${FRONTEND_PORT:-3000}
      - HOME=/data/home
      - IMAGEGEN_URL=http://imagegen:8000
      - IMAGES_DB_PATH=/data/images.db
      - IMAGES_DIR=/data/images
    volumes:
      - backend-data:/data
      - ./data/reference:/data/reference:ro
      # Lets the backend stop/restart the sibling vllm container around
      # each image generation (VRAM can't hold both at once on this GPU).
      # Only exercised when LLM_PROVIDER=vllm (the default) — harmless but
      # unused if LLM_PROVIDER=openai/anthropic, since there's then no local
      # chat model competing for VRAM. Grants the backend full Docker daemon
      # control, not just vllm — accepted tradeoff for this single-user,
      # no-external-exposure tool.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - vllm
      - searxng
      - imagegen

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:${BACKEND_PORT:-8001}
    depends_on:
      - backend

volumes:
  backend-data: {}
  imagegen-hf-cache: {}
